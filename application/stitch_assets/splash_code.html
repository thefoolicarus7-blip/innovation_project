<style>
        .kinetic-gradient {
            background: linear-gradient(135deg, #00288e 0%, #1e40af 50%, #001453 100%);
        }
        .motion-blur-streak {
            filter: blur(80px);
            opacity: 0.15;
            background: linear-gradient(90deg, transparent, #ffffff, transparent);
        }
        .glass-overlay {
            backdrop-filter: blur(2px);
            background: rgba(0, 40, 142, 0.05);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-background font-body text-on-background antialiased overflow-hidden">
<!-- Splash Screen Container (Suppresses Shared Shells per Mandate) -->
<main class="relative h-screen w-full kinetic-gradient flex flex-col items-center justify-center overflow-hidden">
<!-- Abstract Kinetic Background Elements -->
<div class="absolute inset-0 overflow-hidden pointer-events-none">
<div class="absolute -top-[10%] -left-[10%] w-[60%] h-[40%] motion-blur-streak rotate-[35deg]"></div>
<div class="absolute top-[40%] -right-[20%] w-[80%] h-[20%] motion-blur-streak -rotate-[15deg]"></div>
<div class="absolute -bottom-[5%] left-[20%] w-[50%] h-[30%] motion-blur-streak rotate-[110deg]"></div>
<!-- Subtle Radial Highlights -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full h-full opacity-30" style="background: radial-gradient(circle at center, #1e40af 0%, transparent 70%);"></div>
</div>
<!-- Central Brand Identity -->
<div class="relative z-10 flex flex-col items-center px-8 text-center">
<!-- Icon/Logo Element -->
<div class="mb-8 p-6 rounded-full bg-white/10 backdrop-blur-md ring-1 ring-white/20 shadow-2xl">
<span class="material-symbols-outlined text-7xl text-white" style="font-variation-settings: 'FILL' 1;">
                    work
                </span>
</div>
<!-- Brand Name: Literal Transcription from JSON -->
<h1 class="font-headline font-extrabold text-5xl md:text-7xl text-white tracking-tight leading-none mb-4">
                Swipe2Work
            </h1>
<!-- Tagline with Editorial Asymmetry/Spacing -->
<div class="mt-6 space-y-2">
<p class="font-headline text-primary-fixed/90 text-lg md:text-xl font-medium tracking-wide uppercase tracking-[0.2em]">
                    The kinetic career curator
                </p>
<!-- Intentional Divider Shift -->
<div class="w-12 h-1 bg-secondary mx-auto rounded-full mt-6 opacity-80"></div>
<p class="text-white/60 font-body text-sm md:text-base mt-4 max-w-xs mx-auto">
                    Swipe your way to success in Nepal's most premium job market experience.
                </p>
</div>
</div>
<!-- Hero Visualization (Subtle) -->
<div class="absolute bottom-0 w-full h-1/3 flex justify-center items-end opacity-20 grayscale pointer-events-none">
<img alt="" class="w-full object-cover h-full mask-linear-gradient" data-alt="Modern geometric skyscraper architecture with clean glass lines and deep blue reflections under a crisp morning sky" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCuNpiIT-8gCAW10FpKWsWHo4iztvYCY-ca4rASq-4Gp5ShoiRDB23Q6vr1mvT4qvgB_iHuBOh0X3oGwGdushFi1nHD5by9kkkk0vG2_SA3IRAnSJcj49Zq49J_1_KZH5ow3jFIW-OougHjWdCGHDJFjWXqB-WqUPovCTSKB0nwsD4-QbStZ-ywN1Qhj1-lJKwvWgY111zyEBh7jnwxdSUC5IA3QE-TTWt-g3kYMcIKu5NbFvxDavRQ54IMnS0uXAq5S0jBhU2v9gH8"/>
</div>
<!-- Bottom Kinetic Indicator -->
<div class="absolute bottom-12 flex flex-col items-center gap-3">
<div class="w-1 h-12 rounded-full overflow-hidden bg-white/10 relative">
<div class="absolute top-0 left-0 w-full h-1/2 bg-secondary-fixed shadow-[0_0_15px_rgba(133,248,196,0.5)]"></div>
</div>
<span class="text-xs font-label text-white/40 tracking-widest uppercase">Initializing Canvas</span>
</div>
</main>
<!-- Visual Polish: Mask for the bottom image -->
<style>
        .mask-linear-gradient {
            -webkit-mask-image: linear-gradient(to top, rgba(0,0,0,1), rgba(0,0,0,0));
            mask-image: linear-gradient(to top, rgba(0,0,0,1), rgba(0,0,0,0));
        }
    </style>
